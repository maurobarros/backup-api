apiVersion: apps/v1
kind: Deployment
metadata:
  name: backup-api-deployment
  labels:
    app: backup-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backup-api
  template:
    metadata:
      labels:
        app: backup-api
    spec:
      containers:
        - name: backup-api
          image: backup-api-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: backup-api-config
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backup-api-secrets
                  key: SPRING_DATASOURCE_PASSWORD
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3